<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
  text { font-family: sans-serif; fill: #2c2c2a; }
  .label-phase { font-size: 11px; fill: #888780; }
  .label-title { font-size: 14px; font-weight: 500; }
  .label-sub   { font-size: 12px; fill: #5f5e5a; }
  .divider     { stroke: #d3d1c7; stroke-width: 0.5; stroke-dasharray: 3 4; }
  .arr         { stroke: #888780; stroke-width: 1.5; fill: none; }
  .feedback    { stroke: #b4b2a9; stroke-width: 0.8; fill: none; stroke-dasharray: 4 3; }

  /* node fills */
  .box-gray   { fill: #f1efe8; stroke: #5f5e5a; }
  .box-teal   { fill: #e1f5ee; stroke: #0f6e56; }
  .box-purple { fill: #eeedfe; stroke: #534ab7; }
  .box-amber  { fill: #faeeda; stroke: #854f0b; }
  .box-coral  { fill: #faece7; stroke: #993c1d; }

  .text-gray   { fill: #444441; }
  .text-teal   { fill: #085041; }
  .text-purple { fill: #3c3489; }
  .text-amber  { fill: #633806; }
  .text-coral  { fill: #712b13; }
  .text-sub-gray   { fill: #5f5e5a; }
  .text-sub-teal   { fill: #0f6e56; }
  .text-sub-purple { fill: #534ab7; }
  .text-sub-amber  { fill: #854f0b; }
  .text-sub-coral  { fill: #993c1d; }
</style>

<!-- Phase labels -->
<text class="label-phase" x="18" y="96" text-anchor="middle" transform="rotate(-90,18,96)">INGEST</text>
<text class="label-phase" x="18" y="230" text-anchor="middle" transform="rotate(-90,18,230)">EXTRACT</text>
<text class="label-phase" x="18" y="380" text-anchor="middle" transform="rotate(-90,18,380)">REFINE</text>
<text class="label-phase" x="18" y="550" text-anchor="middle" transform="rotate(-90,18,550)">VALIDATE</text>
<text class="label-phase" x="18" y="720" text-anchor="middle" transform="rotate(-90,18,720)">OUTPUT</text>

<!-- Phase dividers -->
<line class="divider" x1="36" y1="148" x2="644" y2="148"/>
<line class="divider" x1="36" y1="290" x2="644" y2="290"/>
<line class="divider" x1="36" y1="460" x2="644" y2="460"/>
<line class="divider" x1="36" y1="640" x2="644" y2="640"/>

<!-- ── PHASE 1: INGEST ── -->
<rect class="box-gray" x="40" y="58" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-gray" x="128" y="81" text-anchor="middle" dominant-baseline="central">Raw qualitative data</text>
<text class="label-sub text-sub-gray" x="128" y="101" text-anchor="middle" dominant-baseline="central">Surveys, interviews, transcripts</text>

<rect class="box-gray" x="252" y="58" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-gray" x="340" y="81" text-anchor="middle" dominant-baseline="central">Preprocessor</text>
<text class="label-sub text-sub-gray" x="340" y="101" text-anchor="middle" dominant-baseline="central">Clean, chunk, embed</text>

<rect class="box-teal" x="464" y="58" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-teal" x="552" y="81" text-anchor="middle" dominant-baseline="central">Dual RAG store</text>
<text class="label-sub text-sub-teal" x="552" y="101" text-anchor="middle" dominant-baseline="central">Survey + literature corpus</text>

<line x1="216" y1="86" x2="250" y2="86" class="arr" marker-end="url(#arrow)"/>
<line x1="428" y1="86" x2="462" y2="86" class="arr" marker-end="url(#arrow)"/>

<!-- ── PHASE 2: EXTRACT ── -->
<rect class="box-purple" x="146" y="168" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-purple" x="234" y="191" text-anchor="middle" dominant-baseline="central">Extraction agent</text>
<text class="label-sub text-sub-purple" x="234" y="211" text-anchor="middle" dominant-baseline="central">Variables, relations, hypotheses</text>

<rect class="box-purple" x="358" y="168" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-purple" x="446" y="191" text-anchor="middle" dominant-baseline="central">Gap detection agent</text>
<text class="label-sub text-sub-purple" x="446" y="211" text-anchor="middle" dominant-baseline="central">Finds missing constructs</text>

<line x1="340" y1="86" x2="340" y2="155" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="234" y1="155" x2="446" y2="155" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="234" y1="155" x2="234" y2="166" class="arr" marker-end="url(#arrow)"/>
<line x1="446" y1="155" x2="446" y2="166" class="arr" marker-end="url(#arrow)"/>
<line x1="322" y1="196" x2="360" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- ── PHASE 3: REFINE ── -->
<rect class="box-amber" x="40" y="310" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-amber" x="128" y="333" text-anchor="middle" dominant-baseline="central">Clarification agent</text>
<text class="label-sub text-sub-amber" x="128" y="353" text-anchor="middle" dominant-baseline="central">Generates follow-up questions</text>

<rect class="box-purple" x="252" y="310" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-purple" x="340" y="333" text-anchor="middle" dominant-baseline="central">Re-extraction agent</text>
<text class="label-sub text-sub-purple" x="340" y="353" text-anchor="middle" dominant-baseline="central">Refines with new context</text>

<rect class="box-purple" x="464" y="310" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-purple" x="552" y="333" text-anchor="middle" dominant-baseline="central">Consolidation agent</text>
<text class="label-sub text-sub-purple" x="552" y="353" text-anchor="middle" dominant-baseline="central">Merges all chunk models</text>

<line x1="446" y1="224" x2="446" y2="296" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="128" y1="296" x2="552" y2="296" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="128" y1="296" x2="128" y2="308" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="296" x2="340" y2="308" class="arr" marker-end="url(#arrow)"/>
<line x1="552" y1="296" x2="552" y2="308" class="arr" marker-end="url(#arrow)"/>
<line x1="216" y1="338" x2="250" y2="338" class="arr" marker-end="url(#arrow)"/>
<line x1="428" y1="338" x2="462" y2="338" class="arr" marker-end="url(#arrow)"/>

<!-- Feedback: retry if gaps remain -->
<path class="feedback" d="M340 366 L340 420 L60 420 L60 196 L144 196" marker-end="url(#arrow)"/>
<text class="label-sub" x="56" y="414" text-anchor="end" fill="#888780">retry if gaps remain</text>

<!-- ── PHASE 4: VALIDATE ── -->
<rect class="box-coral" x="40" y="480" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-coral" x="128" y="503" text-anchor="middle" dominant-baseline="central">Conflict detector</text>
<text class="label-sub text-sub-coral" x="128" y="523" text-anchor="middle" dominant-baseline="central">Contradiction resolution</text>

<rect class="box-teal" x="252" y="480" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-teal" x="340" y="503" text-anchor="middle" dominant-baseline="central">Literature validator</text>
<text class="label-sub text-sub-teal" x="340" y="523" text-anchor="middle" dominant-baseline="central">Semantic Scholar / PubMed</text>

<rect class="box-amber" x="464" y="480" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-amber" x="552" y="503" text-anchor="middle" dominant-baseline="central">Human-in-the-loop</text>
<text class="label-sub text-sub-amber" x="552" y="523" text-anchor="middle" dominant-baseline="central">Researcher reviews + edits</text>

<line x1="552" y1="366" x2="552" y2="466" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="128" y1="466" x2="552" y2="466" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="128" y1="466" x2="128" y2="478" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="466" x2="340" y2="478" class="arr" marker-end="url(#arrow)"/>
<line x1="552" y1="466" x2="552" y2="478" class="arr" marker-end="url(#arrow)"/>
<line x1="216" y1="508" x2="250" y2="508" class="arr" marker-end="url(#arrow)"/>
<line x1="428" y1="508" x2="462" y2="508" class="arr" marker-end="url(#arrow)"/>

<!-- ── PHASE 5: OUTPUT ── -->
<rect class="box-teal" x="146" y="660" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-teal" x="234" y="683" text-anchor="middle" dominant-baseline="central">Final model spec</text>
<text class="label-sub text-sub-teal" x="234" y="703" text-anchor="middle" dominant-baseline="central">Variables + confidence scores</text>

<rect class="box-teal" x="358" y="660" width="176" height="56" rx="8" stroke-width="0.5"/>
<text class="label-title text-teal" x="446" y="683" text-anchor="middle" dominant-baseline="central">Causal graph + YAML</text>
<text class="label-sub text-sub-teal" x="446" y="703" text-anchor="middle" dominant-baseline="central">Exportable, citation-linked</text>

<line x1="552" y1="536" x2="552" y2="646" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="234" y1="646" x2="552" y2="646" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="234" y1="646" x2="234" y2="658" class="arr" marker-end="url(#arrow)"/>
<line x1="446" y1="646" x2="446" y2="658" class="arr" marker-end="url(#arrow)"/>
<line x1="322" y1="686" x2="356" y2="686" class="arr" marker-end="url(#arrow)"/>

<!-- Low confidence feedback loop -->
<path class="feedback" d="M340 536 L340 590 L620 590 L620 338 L640 338" marker-end="url(#arrow)"/>
<text class="label-sub" x="644" y="464" text-anchor="start" fill="#888780">low confidence</text>
<text class="label-sub" x="644" y="476" text-anchor="start" fill="#888780">→ re-refine</text>
</svg>
